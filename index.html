<!DOCTYPE html>
<html lang="en">
<head>
  <title>Bootstrap Custom Forms</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

  <style>
    body {
      background: #f4f6f9;
      padding: 40px;
    }
    .box {
      max-width: 500px;
      margin: auto;
      background: #fff;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    h2 {
      text-align: center;
      margin-bottom: 20px;
    }
  </style>
</head>

<body>

<div class="box">

  <h2>Bootstrap Custom Forms</h2>

  <form>

    <!-- Custom Select -->
    <div class="form-group">
      <label>Choose Course</label>
      <select class="custom-select">
        <option selected>Select option</option>
        <option>BCA</option>
        <option>BSc</option>
        <option>BCom</option>
      </select>
    </div>

    <!-- Custom File -->
    <div class="form-group">
      <label>Upload File</label>
      <div class="custom-file">
        <input type="file" class="custom-file-input">
        <label class="custom-file-label">Choose file</label>
      </div>
    </div>

    <!-- Custom Checkbox -->
    <div class="form-group">
      <div class="custom-control custom-checkbox">
        <input type="checkbox" class="custom-control-input" id="c1">
        <label class="custom-control-label" for="c1">Accept Terms</label>
      </div>
    </div>

    <!-- Custom Radio -->
    <div class="form-group">
      <div class="custom-control custom-radio">
        <input type="radio" id="r1" name="r" class="custom-control-input">
        <label class="custom-control-label" for="r1">Option 1</label>
      </div>
      <div class="custom-control custom-radio">
        <input type="radio" id="r2" name="r" class="custom-control-input">
        <label class="custom-control-label" for="r2">Option 2</label>
      </div>
    </div>

    <!-- Custom Switch -->
    <div class="form-group">
      <div class="custom-control custom-switch">
        <input type="checkbox" class="custom-control-input" id="s1">
        <label class="custom-control-label" for="s1">Toggle Switch</label>
      </div>
    </div>

    <!-- Range -->
    <div class="form-group">
      <label>Range</label>
      <input type="range" class="custom-range">
    </div>

    <!-- Submit -->
    <button class="btn btn-primary btn-block">Submit</button>

  </form>

</div>

</body>
</html>
